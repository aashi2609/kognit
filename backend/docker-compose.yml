services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: kognit_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kognit
      POSTGRES_PASSWORD: kognit_secret
      POSTGRES_DB: kognit_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kognit"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kognit_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
